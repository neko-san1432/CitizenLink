<!DOCTYPE htm <link rel="stylesheet" href="./css/additional-styles.css">
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
                   script-src 'self' https://cdnjs.cloudflare.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/;
                   style-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline';
                   img-src 'self' data: https:;
                   font-src 'self' https://cdnjs.cloudflare.com;
                   frame-src https://www.google.com/recaptcha/;
                   connect-src 'self' https://lspscscjmfcywoakgrtf.supabase.co https://www.google.com/recaptcha/"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - CitizenLink</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="./css/additional-styles.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/form.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Add reCAPTCHA script -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <i class="fas fa-shield-alt"></i>
          <span>CitizenLink</span>
        </a>
      </div>

      <div class="auth-content">
        <div class="auth-card">
          <div class="card-header">
            <h2>Create an Account</h2>
            <p>Sign up for a citizen account to submit and track complaints.</p>
          </div>
          <br />
          <form id="signup-form">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Enter your full name"
                required
              />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <div class="phone-input-group" style="border: solid">
                <span class="phone-prefix">+63</span>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="9XXXXXXXXX"
                  pattern="[9][0-9]{9}"
                  maxlength="10"
                  required
                />
              </div>
              <small class="input-hint">Enter 10 digits starting with 9</small>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Create a password"
                required
              />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Confirm your password"
                required
              />
            </div>
            <div class="form-group recaptcha-container">
              <div
                class="g-recaptcha"
                data-sitekey="6Lfd4l8rAAAAAPrVRfM47ZZmBbnkIfaZL_EQCjMD"
                data-callback="onRecaptchaComplete"
                data-expired-callback="onRecaptchaExpired"
              ></div>
            </div>
            <button
              type="submit"
              class="btn btn-primary btn-block needs-recaptcha"
              disabled
            >
              Continue
            </button>
            <div class="auth-footer">
              <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
    <!-- OTP Verification Modal -->
    <div class="otp-modal" id="otp-modal">
      <div class="otp-modal-content">
        <div class="otp-modal-header text-center">
          <h2>Verify Your Phone</h2>
          <p>Enter the 6-digit code sent to your phone</p>
        </div>

        <div class="otp-input-group">
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="[0-9]"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="[0-9]"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="[0-9]"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="[0-9]"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="[0-9]"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="[0-9]"
            inputmode="numeric"
          />
        </div>

        <div class="timer text-center" id="otp-timer">
          Code expires in: <span>30</span>s
        </div>

        <button class="verify-button" id="verify-otp" disabled>
          Verify Code
        </button>

        <div class="text-center mt-1">
          Didn't receive the code?
          <button class="resend-button" id="resend-otp" disabled>
            Resend Code
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="js/recaptcha.js"></script>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
